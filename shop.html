<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda</title>
  <link rel="stylesheet" href="styleShop.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1>🛒 Mi Tienda</h1>
    <div class="cart">
      🛍️ Carrito <span id="cartCount">0</span>
    </div>
  </header>

  <!-- CONTENIDO -->
  <main class="container">

    <!-- PRODUCTOS -->
    <section class="products">

      <h2>Productos disponibles</h2>

      <div class="products-grid">

      </div>

    </section>

    <!-- CARRITO -->
    <aside class="cart-section">

      <h2>Tu carrito</h2>

      <div class="cart-items">
        <p class="empty">No hay productos aún</p>
      </div>

      <div class="cart-total">
        <h3>Total: $0</h3>
      </div>

      <button class="buy-btn">Finalizar compra</button>

    </aside>

  </main>
  <script src="script.js"></script>
</body>
</html>
